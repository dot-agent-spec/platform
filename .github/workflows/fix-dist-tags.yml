name: Fix npm dist-tags (one-off remediation)

# Manual-only. Moves the `latest` dist-tag for packages that were already
# published correctly but under the wrong tag due to the hyphen-detection bug
# fixed in publish-ts.yml / publish-tree-sitter.yml / publish-parser-dsl.yml /
# publish-kernel-dsl.yml. Delete this file once the pointers are fixed.
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Move latest dist-tag to 0.10.0
        run: |
          npm dist-tag add @dot-agent/tree-sitter@0.10.0 latest
          npm dist-tag add @dot-agent/parser-dsl@0.10.0 latest
          npm dist-tag add @dot-agent/kernel-dsl@0.10.0 latest
          npm dist-tag add @dot-agent/language-server@0.10.0 latest
