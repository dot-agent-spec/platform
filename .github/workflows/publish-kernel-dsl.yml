name: Publish kernel-dsl

on:
  push:
    tags: ['kernel-dsl@*']

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version "=0.2.122" --locked

      - name: Install dependencies
        run: npm ci

      - name: Build WASM (release)
        run: |
          export CC_wasm32_wasip1="zig cc -target wasm32-wasi"
          export CXX_wasm32_wasip1="zig c++ -target wasm32-wasi"
          export AR_wasm32_wasip1="zig ar"
          npm run build
        working-directory: packages/kernel-dsl

      # dist/index.js loads its WASM via `new URL('../pkg/..._bg.wasm', import.meta.url)`
      # at runtime — pkg/ has to actually ship (package.json "files") or a real
      # `npm install` consumer gets an ENOENT the first time init() runs, even
      # though everything looks fine inside this monorepo checkout where dist/
      # and pkg/ just happen to sit next to each other on disk either way.
      - name: Verify build artifacts
        working-directory: packages/kernel-dsl
        run: |
          for f in dist/index.js \
                    dist/index.cjs \
                    dist/index.d.ts \
                    pkg/dot_agent_kernel_dsl.js \
                    pkg/dot_agent_kernel_dsl.d.ts \
                    pkg/dot_agent_kernel_dsl_bg.js \
                    pkg/dot_agent_kernel_dsl_bg.wasm \
                    pkg/dot_agent_kernel_dsl_bg.wasm.d.ts; do
            [ -f "$f" ] || { echo "MISSING: $f"; exit 1; }
          done
          node -e "if (!require('./package.json').files.includes('pkg/')) { console.error('package.json \"files\" must include pkg/ or the WASM binary never ships'); process.exit(1) }"
          echo "All artifacts present."

      - name: Determine npm dist-tag
        id: npm_tag
        run: |
          # GITHUB_REF_NAME is "<pkg>@<version>" — package names here can contain
          # hyphens themselves (tree-sitter, parser-dsl, ...), so checking the whole
          # ref for "-" falsely flags a real, non-prerelease version as alpha. Only
          # the version portion after "@" determines prerelease-ness.
          VERSION="${GITHUB_REF_NAME#*@}"
          if [[ "$VERSION" == *-* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: npm publish --provenance --tag ${{ steps.npm_tag.outputs.tag }}
        working-directory: packages/kernel-dsl
