name: Publish kernel-dsl

on:
  push:
    tags: ['kernel-dsl@*']

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version "=0.2.122" --locked

      - name: Install dependencies
        run: npm ci

      - name: Build WASM (release)
        run: |
          export CC_wasm32_wasip1="zig cc -target wasm32-wasi"
          export CXX_wasm32_wasip1="zig c++ -target wasm32-wasi"
          export AR_wasm32_wasip1="zig ar"
          npm run build:release
        working-directory: packages/kernel-dsl

      - name: Verify build artifacts
        working-directory: packages/kernel-dsl
        run: |
          for f in index.js \
                    scripts/discover-wasm-imports.js \
                    scripts/patch-wasm-bindgen.js \
                    pkg/dot_agent_kernel_dsl.js \
                    pkg/dot_agent_kernel_dsl.d.ts \
                    pkg/dot_agent_kernel_dsl_bg.js \
                    pkg/dot_agent_kernel_dsl_bg.wasm \
                    pkg/dot_agent_kernel_dsl_bg.wasm.d.ts \
                    pkg/package.json; do
            [ -f "$f" ] || { echo "MISSING: $f"; exit 1; }
          done
          echo "All artifacts present."

      - name: Publish to npm
        run: npm publish --provenance
        working-directory: packages/kernel-dsl
