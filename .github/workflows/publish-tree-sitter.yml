name: Publish tree-sitter

on:
  push:
    tags: ['tree-sitter@*']

permissions:
  id-token: write
  contents: read

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      # `build` (not `generate`) is required here: `generate` only regenerates
      # parser.c from grammar.js, it never produces `dist/` (wasm + tsup output),
      # which is what package.json's main/exports/files actually ship. `dist/`
      # is gitignored, so without this step a fresh CI checkout would publish
      # a package with no dist/ at all. `tree-sitter build --wasm` needs
      # emscripten; when `emcc` isn't on PATH it falls back to running the
      # build in Docker automatically (verified locally), which is why no
      # separate emsdk setup step is needed on GitHub's Docker-equipped runners.
      - name: Build (wasm + dist)
        run: npm run build
        working-directory: packages/tree-sitter

      - name: Determine npm dist-tag
        id: npm_tag
        run: |
          # GITHUB_REF_NAME is "<pkg>@<version>" — package names here can contain
          # hyphens themselves (tree-sitter, parser-dsl, ...), so checking the whole
          # ref for "-" falsely flags a real, non-prerelease version as alpha. Only
          # the version portion after "@" determines prerelease-ness.
          VERSION="${GITHUB_REF_NAME#*@}"
          if [[ "$VERSION" == *-* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: npm publish --provenance --access public --tag ${{ steps.npm_tag.outputs.tag }}
        working-directory: packages/tree-sitter

  publish-crate:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish to crates.io
        run: cargo publish -p dot-agent-tree-sitter
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
