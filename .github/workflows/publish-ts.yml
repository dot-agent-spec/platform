name: Publish TypeScript Package

on:
  push:
    tags:
      - 'compiler@*'
      - 'language-server@*'
      - 'sdk@*'
      - 'cli@*'

permissions:
  id-token: write
  contents: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      directory: ${{ steps.map.outputs.directory }}
    steps:
      - id: map
        run: |
          case "${GITHUB_REF_NAME}" in
            compiler@*)        echo "directory=packages/compiler" >> "$GITHUB_OUTPUT" ;;
            language-server@*) echo "directory=packages/language-server" >> "$GITHUB_OUTPUT" ;;
            sdk@*)             echo "directory=packages/sdk" >> "$GITHUB_OUTPUT" ;;
            cli@*)             echo "directory=apps/dot-agent-cli" >> "$GITHUB_OUTPUT" ;;
          esac

  publish:
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version "=0.2.122" --locked

      - name: Install dependencies
        run: npm ci

      # compiler, sdk, and cli all import types (and, for sdk, runtime WASM)
      # transitively down the chain tree-sitter -> parser-dsl -> kernel-dsl ->
      # compiler -> sdk -> cli. This workflow only checks out source — none of
      # that chain is prebuilt — so it must be built here regardless of which
      # package the pushed tag targets, or tsdown's dts step fails with "Cannot
      # find module" (compiler/sdk/cli) or a cascaded implicit-any. Cheap/
      # idempotent to always run; language-server's own "build" is a no-op so
      # it's unaffected either way.
      - name: Build tree-sitter (WASM)
        run: npm run build
        working-directory: packages/tree-sitter

      - name: Build parser-dsl (WASM)
        run: npm run build
        working-directory: packages/parser-dsl
        env:
          CC_wasm32_wasip1: zig cc -target wasm32-wasi
          CXX_wasm32_wasip1: zig c++ -target wasm32-wasi
          AR_wasm32_wasip1: zig ar

      - name: Build kernel-dsl (WASM)
        run: npm run build
        working-directory: packages/kernel-dsl
        env:
          CC_wasm32_wasip1: zig cc -target wasm32-wasi
          CXX_wasm32_wasip1: zig c++ -target wasm32-wasi
          AR_wasm32_wasip1: zig ar

      - name: Build compiler
        run: npm run build
        working-directory: packages/compiler

      # cli depends on sdk (which itself depends on compiler, already built
      # above) for @dot-agent/sdk's types.
      - name: Build sdk
        run: npm run build
        working-directory: packages/sdk

      - name: Build
        run: npm run build
        working-directory: ${{ needs.resolve.outputs.directory }}

      # Test whatever package this tag publishes. For sdk this runs the
      # browser-bundle guard, which bundles the whole sdk → kernel-dsl chain for
      # a browser target and catches a `node:` scheme leak — the tsup→tsdown
      # regression that broke Murici's webpack build in 0.10.2. A Node-only test
      # can't see it. --if-present so packages without a test script are skipped.
      - name: Run tests
        run: npm test --if-present
        working-directory: ${{ needs.resolve.outputs.directory }}

      - name: Determine npm dist-tag
        id: npm_tag
        run: |
          # GITHUB_REF_NAME is "<pkg>@<version>" — package names here can contain
          # hyphens themselves (language-server), so checking the whole ref for "-"
          # falsely flags a real, non-prerelease version as alpha. Only the version
          # portion after "@" determines prerelease-ness.
          VERSION="${GITHUB_REF_NAME#*@}"
          if [[ "$VERSION" == *-* ]]; then
            echo "tag=alpha" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        run: npm publish --provenance --access public --tag ${{ steps.npm_tag.outputs.tag }}
        working-directory: ${{ needs.resolve.outputs.directory }}
