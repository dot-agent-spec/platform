name: Publish TypeScript Package

on:
  push:
    tags:
      - 'compiler@*'
      - 'language-server@*'
      - 'sdk@*'
      - 'cli@*'

permissions:
  id-token: write
  contents: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      directory: ${{ steps.map.outputs.directory }}
    steps:
      - id: map
        run: |
          case "${GITHUB_REF_NAME}" in
            compiler@*)        echo "directory=packages/compiler" >> "$GITHUB_OUTPUT" ;;
            language-server@*) echo "directory=packages/language-server" >> "$GITHUB_OUTPUT" ;;
            sdk@*)             echo "directory=packages/sdk" >> "$GITHUB_OUTPUT" ;;
            cli@*)             echo "directory=apps/dot-agent-cli" >> "$GITHUB_OUTPUT" ;;
          esac

  publish:
    needs: resolve
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        working-directory: ${{ needs.resolve.outputs.directory }}

      - name: Publish to npm
        run: npm publish --provenance --access public
        working-directory: ${{ needs.resolve.outputs.directory }}
