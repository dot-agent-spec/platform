name: Publish VS Code Extension

on:
  push:
    tags: ['vscode@*']

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24.x'

      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli --version "=0.2.122" --locked

      - name: Install dependencies
        run: npm ci

      # The extension bundles tree-sitter and parser-dsl's compiled WASM output
      # directly (scripts/build.mjs in apps/vscode-extension) rather than relying
      # on vsce's automatic dependency packaging, which breaks on this npm
      # workspaces monorepo (see DA01-01-update-version-and-packages.md item 9).
      # That means both Rust→WASM packages must be built here first — this
      # workflow previously skipped them entirely and additionally tried to run
      # a "build" script on language-server, which doesn't have one (it ships
      # JS source directly, no compile step).
      - name: Build tree-sitter (WASM)
        run: npm run build
        working-directory: packages/tree-sitter

      - name: Build parser-dsl (WASM)
        run: npm run build
        working-directory: packages/parser-dsl
        env:
          CC_wasm32_wasip1: zig cc -target wasm32-wasi
          CXX_wasm32_wasip1: zig c++ -target wasm32-wasi
          AR_wasm32_wasip1: zig ar

      - name: Build compiler
        run: npm run build --workspace=packages/compiler

      - name: Package extension
        run: npm run package
        working-directory: apps/vscode-extension

      - name: Upload vsix to release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/vscode-extension/*.vsix

      - name: Determine pre-release flag
        id: prerelease
        run: |
          # VS Code Marketplace has no semver-prerelease concept in the `version` field — its own
          # convention is an odd minor number published with `--pre-release`. Tags without a `-`
          # suffix (e.g. this rehearsal's `vscode@0.5.1`) are treated as pre-release; a tag with an
          # even minor and no rehearsal marker is a stable release.
          # GITHUB_REF_NAME is "vscode@<version>" — check only the version portion after "@" for
          # "-", not the whole ref (a hyphenated package name would otherwise false-positive here,
          # as it did in the npm dist-tag detection of the sibling publish-*.yml workflows).
          VERSION="${GITHUB_REF_NAME#*@}"
          if [[ "$VERSION" == *-* ]]; then
            echo "flag=--pre-release" >> "$GITHUB_OUTPUT"
          else
            echo "flag=" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to VS Code Marketplace
        run: npx vsce publish ${{ steps.prerelease.outputs.flag }} --pat "$VSCE_PAT" --packagePath apps/vscode-extension/*.vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Publish to Open VSX
        # always(): Marketplace and Open VSX are independent registries — a
        # failure/auth problem on one (continue-on-error only protects the
        # job's own outcome, it doesn't make GitHub run a step after a prior
        # one failed) shouldn't skip the other.
        if: always()
        run: npx ovsx publish apps/vscode-extension/*.vsix -p "$OVSX_PAT"
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        continue-on-error: true
