name: Build Kernel

on:
  push:
    paths:
      - 'kernel-dsl/**'
  pull_request:
    paths:
      - 'kernel-dsl/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build Kernel
        run: |
          export CC_wasm32_unknown_unknown="zig cc -target wasm32-wasi"
          export CXX_wasm32_unknown_unknown="zig c++ -target wasm32-wasi"
          export AR_wasm32_unknown_unknown="zig ar"
          cd kernel-dsl && npm run build
