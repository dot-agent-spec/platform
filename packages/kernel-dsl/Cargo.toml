[package]
name = "dot-agent-kernel-dsl"
version = "0.5.0-alpha.1"
edition = "2021"
description = "WebAssembly kernel for parsing and executing agent behavior DSL with deterministic FSM orchestration"
license = "Apache-2.0"
authors = ["Danilo Borges <contato@daniloborg.es>"]
repository = "https://github.com/dot-agent-spec/platform"
homepage = "https://dot-agent.ai"
documentation = "https://github.com/dot-agent-spec/platform/tree/main/packages/kernel-dsl#readme"
readme = "README.md"
keywords = ["wasm", "agent", "dsl", "parser", "fsm", "state-machine"]
categories = ["wasm", "parser-implementations"]
exclude = ["pkg/", "target/", ".github/", "*.wasm"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.6"
js-sys = "0.3"
tree-sitter = "0.25"
dot-agent-tree-sitter = { path = "../tree-sitter" }
serde_json = "1.0"
dot-agent-parser-dsl = { path = "../parser-dsl" }
ts-rs = { version = "10", features = ["serde-compat"] }

[dev-dependencies]
dot-agent-parser-dsl = { path = "../parser-dsl" }

[build-dependencies]
serde_json = "1.0"
dot-agent-tree-sitter = { path = "../tree-sitter" }
