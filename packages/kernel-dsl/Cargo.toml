[package]
name = "dot-agent-kernel"
version = "0.1.0"
edition = "2021"
description = "WASM kernel for parsing and validating Agent DSL"
license = "Apache-2.0"
authors = ["Danilo Borges <contato@daniloborg.es>"]
repository = "https://github.com/dot-agent-spec/kernel-dsl"
homepage = "https://github.com/dot-agent-spec/kernel-dsl"
keywords = ["wasm", "agent", "dsl", "parser"]
categories = ["wasm", "parser-implementations"]

[package.metadata.scripts]
build   = "wasm-pack build --target bundler"
patch   = """node -e "const fs=require('fs'),p=require('./pkg/package.json');p.name='@dot-agent/kernel';p.publishConfig={access:'public'};fs.writeFileSync('./pkg/package.json',JSON.stringify(p,null,2)+'\\n')" """
release = "cargo run-script build && cargo run-script patch"

[lib]
crate-type = ["cdylib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde-wasm-bindgen = "0.6"
js-sys = "0.3"
