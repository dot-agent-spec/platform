[package]
name = "dot-agent-parser-dsl"
version = "0.10.2"
edition = "2021"
description = "Unified DSL parser for dot-agent — parses .behavior and .description files using tree-sitter, compiles to WASM for compiler/tooling and as rlib for kernel-dsl"
license = "Apache-2.0"
authors = ["Danilo Borges <contato@daniloborg.es>"]
repository = "https://github.com/dot-agent-spec/platform"
homepage = "https://dot-agent.ai"
keywords = ["wasm", "agent", "dsl", "parser", "scxml"]
categories = ["wasm", "parser-implementations"]
exclude = ["pkg/", "target/", ".github/", "*.wasm"]

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "=0.2.122"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tree-sitter = "0.25"
dot-agent-tree-sitter = { path = "../tree-sitter" }
ts-rs = { version = "10", features = ["serde-compat"] }

[build-dependencies]
serde_json = "1.0"
dot-agent-tree-sitter = { path = "../tree-sitter" }
