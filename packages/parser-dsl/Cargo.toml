[package]
name = "dot-agent-behavior-parser"
version = "0.1.0"
edition = "2021"
description = "Shared behavior DSL parser and static analysis for dot-agent — compiles to WASM for compiler/tooling and as rlib for kernel-dsl"
license = "Apache-2.0"
authors = ["Danilo Borges <contato@daniloborg.es>"]
repository = "https://github.com/dot-agent-spec/dot-agent-spec"
homepage = "https://dot-agent.ai"
keywords = ["wasm", "agent", "dsl", "parser", "scxml"]
categories = ["wasm", "parser-implementations"]
exclude = ["pkg/", "target/", ".github/", "*.wasm"]

[package.metadata.scripts]
build   = "wasm-pack build --target bundler --out-dir pkg --out-name behavior-parser"
patch   = """node -e "const fs=require('fs'),p=require('./pkg/package.json');p.name='@dot-agent/behavior-parser';p.publishConfig={access:'public'};fs.writeFileSync('./pkg/package.json',JSON.stringify(p,null,2)+'\\n')" """
release = "cargo run-script build && cargo run-script patch"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "=0.2.122"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tree-sitter = "0.25"
dot-agent-tree-sitter = "0.4.0"

[build-dependencies]
serde_json = "1.0"
dot-agent-tree-sitter = "0.4.0"
