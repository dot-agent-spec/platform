[package]
name = "dot-agent-tree-sitter"
version = "0.10.1"
authors = ["Danilo Borges <contato@daniloborg.es>"]
description = "Tree-sitter grammars for the .agent DSL (.description / .type / .behavior)"
license = "Apache-2.0"
repository = "https://github.com/dot-agent-spec/platform"
edition = "2021"
build = "build.rs"
include = [
    "tree-sitter-description/src/*.c",
    "tree-sitter-description/src/tree_sitter/*.h",
    "tree-sitter-behavior/src/*.c",
    "tree-sitter-behavior/src/tree_sitter/*.h",
    "tree-sitter-behavior/src/node-types.json",
    "bindings/rust/**",
    "build.rs",
    "Cargo.toml",
]

[lib]
path = "bindings/rust/src/lib.rs"

[dependencies]
tree-sitter = "0.25"

[build-dependencies]
cc = "1"
